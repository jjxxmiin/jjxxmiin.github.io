name: Daily AI Stocks

on:
  schedule:
    - cron: '30 8 * * *'   # 08:30 UTC = 17:30 KST (daily)
  workflow_dispatch:

jobs:
  stocks:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install google-genai PyYAML

      - name: Curate AI stocks
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          cd automation
          python ai_stocks_bot.py

      - name: Commit and Push
        run: |
          git config --global user.name 'OPSOAI Bot'
          git config --global user.email 'ceo@opsoai.com'
          git add _data/ai_stocks.yml
          git commit -m "Daily AI stocks update [$(date +'%Y-%m-%d')]" || echo "No changes to commit"
          git pull --rebase
          git push

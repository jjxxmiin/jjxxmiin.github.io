name: Daily AI Trend Post

on:
  schedule:
    # 하루 2회 자동 포스팅 (오전/오후). 매 실행마다 트렌드 상위 중 중복 아닌 첫 주제로 글 1건 생성.
    # 오후 실행은 오전 글을 (checkout으로) 이미 보므로 중복 제외 → 서로 다른 글 2건.
    - cron: '0 0 * * *' # 00:00 UTC = 09:00 KST (오전)
    - cron: '0 8 * * *' # 08:00 UTC = 17:00 KST (오후)
  workflow_dispatch: # Allow manual trigger

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          cd automation
          pip install -r requirements.txt

      - name: Set up Node (Mermaid validation)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Mermaid validator deps
        run: |
          cd automation
          npm install --no-audit --no-fund

      - name: Run Daily Trend Bot
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd automation
          python daily_trend_bot.py

      - name: Commit and Push
        run: |
          git config --global user.name 'OPSOAI Bot'
          git config --global user.email 'ceo@opsoai.com'
          git add _posts/
          git commit -m "Auto-generated trend post for $(date +'%Y-%m-%d %H:%M UTC')" || echo "No changes to commit"
          git pull --rebase
          git push

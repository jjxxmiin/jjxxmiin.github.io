# 주간 AI 소식 — automation/ai_news_bot.py 가 매주 갱신 (수동 편집도 가능)
updated: '2026-07-06'
title_note: 최근 1~2주 AI 툴 업데이트 (2026.7.6 기준)
big_picture: 정부가 프론티어 모델의 출시를 직접 조율할 만큼 보안 이슈가 대두된 가운데, 주요 서비스들은 단순 텍스트 생성을 넘어 사용자의 작업 환경 안에서 실질적인 업무를 자율 수행하는 에이전트 기반으로 빠르게 재편되고 있습니다.
categories:
- name: 프론티어 모델
  items:
  - date: 6/26
    text: OpenAI GPT-5.6 — 미국 정부의 보안 사전 검토 요청에 따라 신뢰할 수 있는 파트너에게 우선 공개하는 제한적 방식으로 코딩, 생물학, 사이버 보안 기능이 강화된 모델 시리즈를 출시함.
  - date: 6/30
    text: 바이두 Unlimited-OCR — 이전 토큰 128개만 참조하는 방식을 도입해 메모리 사용량을 줄이고 40페이지 이상의 비정형 문서를 한 번에 인식하는 경량형 오픈소스 광학문자인식 모델을 공개함.
- name: 코딩 툴
  items:
  - date: 7/1
    text: JetBrains Junie — 터미널과 IDE 환경에서 계획 수립부터 디버깅까지 수행할 수 있으며 사용자가 비용에 맞춰 연동 모델을 직접 선택할 수 있는 AI 코딩 에이전트를 정식 출시함.
  - date: 6/29
    text: Cursor for iOS — 데스크톱이나 클라우드에서 실행 중인 AI 코딩 에이전트를 모바일 기기에서 원격으로 구동하고 코드를 검토할 수 있는 네이티브 iOS 앱을 베타 버전으로 출시함.
  - date: 6/29
    text: Cognition Devin Fusion — 고성능 프론티어 모델과 저비용 소형 모델을 병렬로 라우팅하여 실제 작업에서 코딩 성능을 유지하면서도 구동 비용을 35% 낮춘 새로운 아키텍처를 적용함.
- name: 영상/이미지
  items:
  - date: 6/26
    text: Kling AI 3.0 — 캐릭터의 음성과 입모양을 동기화하는 네이티브 오디오 기능과 다중 샷(Multi-shot) 생성 기능을 지원하며 최대 15초 길이의 1080p 해상도 비디오를 생성하도록 업데이트됨.
  - date: 7/1
    text: Midjourney V8.2 미리보기 — 드래프트 모드에서의 대규모 배치 처리 지원 및 프롬프트에 새로운 무작위 스타일 지정 파라미터를 추가한 버전을 제한적으로 테스트 공개함.
  - date: 6/25
    text: Canva Veo 3 탑재 — 영상 생성 AI 모델을 플랫폼 내부에 통합하여 텍스트 프롬프트만으로 배경음과 효과음이 포함된 고화질 비디오를 바로 생성할 수 있도록 편집기를 개편함.
- name: 디자인
  items:
  - date: 6/24
    text: Figma Motion 및 AI 도구 — 캔버스 내에서 프롬프트 입력을 통해 사용자 지정 셰이더와 모션 효과를 즉시 적용하고 와이어프레임을 시각적으로 구체화하는 기능을 추가함.
  - date: 6/24
    text: Brilliant — 피그마와 유사한 기능을 제공하면서 AI 에이전트가 캔버스 상에서 병렬로 디자인 작업을 보조하고 작업 내역을 평문 기반 깃(Git) 친화적 파일로 저장하는 무료 툴을 출시함.
- name: 검색
  items:
  - date: 6/25
    text: 네이버 AI탭 — 5천만 명의 사용자를 대상으로 대화형 AI 검색창을 전면 개방해 정보 요약뿐 아니라 쇼핑 장바구니 담기와 장소 예약 등 실제 행동까지 한 화면에서 실행되도록 개편함.
  - date: 7/2
    text: 다음 AI 요약 — 포털 검색창 상단에 거대언어모델을 활용해 검색된 웹 문서와 기사 내용을 구조적으로 요약 및 정리해 보여주는 기능을 도입함.
- name: 문서/생산성
  items:
  - date: 6/29
    text: Microsoft 365 Copilot — 대화와 협업 영역의 공간을 분리하고 탐색 메뉴를 간소화하여 사용자가 도구와 파일에 더 빠르게 접근할 수 있도록 전체 인터페이스를 업데이트함.
  - date: 7/1
    text: IBM Knowledge Transformer — 동영상, PPT, PDF 등의 비정형 콘텐츠를 AI 에이전트가 정확하게 인식할 수 있도록 마크다운 문서 형태로 구조화해주는 서비스를 출시함.
  - date: 7/4
    text: Microsoft Copilot 개편 — 팟캐스트 자동 생성 등 일부 실험적 부가 기능을 중단하고 흩어져 있던 AI 앱들을 실무 결과물 도출 위주의 단일 업무 시스템으로 통합함.
